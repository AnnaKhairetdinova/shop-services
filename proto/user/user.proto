syntax = "proto3";

package user;

option go_package = "github.com/AnnaKhairetdinova/shop-services/proto/user";

// ── Сервис ───────────────────────────────────────────────────────
service UserService {
    rpc CreateUser (CreateUserRequest)  returns (CreateUserResponse);
    rpc GetUser    (GetUserRequest)     returns (GetUserResponse);
    rpc ListUsers  (ListUsersRequest)   returns (ListUsersResponse);
}

// ── Общая структура пользователя ─────────────────────────────────
message UserMessage {
    string id         = 1;   // UUID как строка
    string name       = 2;
    string email      = 3;
    string created_at = 4;   // ISO-8601
}

// ── CreateUser ───────────────────────────────────────────────────
message CreateUserRequest {
    string name  = 1;
    string email = 2;
}
message CreateUserResponse {
    UserMessage user = 1;
}

// ── GetUser ─────────────────────────────────────────────────────
message GetUserRequest {
    string id = 1;   // UUID
}
message GetUserResponse {
    UserMessage user = 1;
}

// ── ListUsers ────────────────────────────────────────────────────
message ListUsersRequest {}
message ListUsersResponse {
    repeated UserMessage users = 1;
}
